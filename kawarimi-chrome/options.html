<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kawarimi Settings</title>
    <style>
        body {
            background-color: #0E0E10;
            color: rgba(255, 255, 255, 0.8);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(37, 99, 235, 0.15), transparent 400px);
        }
        .container {
            background: rgba(30, 30, 35, 0.5);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 40px;
            width: 340px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            transform: translateZ(0); 
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #2563EB, #60A5FA);
            border-radius: 16px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.3);
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 6px 0;
            color: #fff;
            letter-spacing: -0.5px;
        }
        p.desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin: 0;
        }
        .form-group { margin-bottom: 28px; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.7);
        }
                input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="number"] {
            appearance: textfield;
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input:focus {
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }
        button {
            width: 100%;
            background: #2563EB;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
        }
        button:hover { 
            background: #3B82F6; 
            transform: scale(1.03); 
        }
                button.success { background: #10B981; }

        .reset-button {
            margin-top: 10px;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .reset-button:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">K</div>
            <h1>Kawarimi</h1>
            <p class="desc">Seamless code replacement</p>
        </div>
        <div class="form-group">
            <label>VS Code Localhost Port</label>
            <input type="number" id="portInput" placeholder="Default: 10240">
        </div>
                <button id="saveBtn">Save Preferences</button>
        <button id="resetBtn" class="reset-button">Reset to Default</button>
    </div>
    <script src="options.js"></script>
</body>
</html>
